<!DOCTYPE html>
<html lang="en">
<head>
<title>Register</title>
<script type="text/javascript">
window.onload = function () {
	var regName = document.getElementById("regName");
	var regPhone = document.getElementById("regPhone");
	var regPass = document.getElementById("regPass");

  document.getElementById("form").onsubmit = function () {
    if (!regName.value) {
      return false;
    }
    if (!regPhone.value) {
      return false;
    }

    var jsonData = {username: regName.value, phone_number: regPhone.value, password: regPass.value};
    var json = JSON.stringify(jsonData)
    fetch('http://localhost:8080/register', {
				method: 'POST',
				headers: {
						'Content-Type': 'application/json',
				},
				body:json,
    })
		.then(response => {
				if (!response.ok) {
						throw new Error(`HTTP error! Status: ${response.status}`);
				}
				return response.json();
		})
		.then(data => {
				console.log('Server Response:', data);
				alert('Data submitted successfully!');
		})
		.catch(error => {
				console.error('Error:', error);
				alert('Failed to submit data.');
		});
  };
};
</script>
<style type="text/css">
html {
    overflow: hidden;
}

body {
    overflow: hidden;
    padding: 0;
    margin: 0;
    width: 100%;
    height: 100%;
    background: gray;
}

#form {
    padding: 0 0.5em 0 0.5em;
    margin: 0;
    position: absolute;
    bottom: 1em;
    left: 0px;
    width: 100%;
    overflow: hidden;
}

</style>
</head>
<body>
<form id="form">
    <label>Username:</label><br>
    <input type="text" id="regName" size="64" autofocus /><br>
    <label>Phone number:</label><br>
    <input type="text" id="regPhone" size="64" autofocus /><br>
    <label>Password:</label><br>
    <input type="text" id="regPass" size="64" autofocus /><br>
    <input type="submit" value="Send" />
</form>
</body>
</html>
